<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Trivia App</title>
    <link rel="icon" type="image/x-icon" href="favicon.png" />
    <link rel="stylesheet" href="style.css" />
    <script src="script.js" defer></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Audiowide&family=Merriweather:ital,opsz,wght@0,18..144,300..900;1,18..144,300..900&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="topbar">
      <h2 class = "nobgtext">Trivia Game</h2>
      <h2 class = "nobgtext errorMSG" id = "errorDisplay">Error</h2>
    </div>
    <button class = "playbutton" id = "play">Play</button>
    <select class = "otherGameModes" id = "otherGameModes">
      <option class = "playbutton1" id = "playHard">hard</button>
      <option class = "playbutton1" id = "playNormal">normal</button>
      <option class = "playbutton1" id = "playEasy">easy</button>
    </select>
    <select name="trivia_category" class="form-control" id = "categorySelect">
			<option value="any">Any Category</option>
			<option value="9">General Knowledge</option><option value="10">Entertainment: Books</option><option value="11">Entertainment: Film</option><option value="12">Entertainment: Music</option><option value="13">Entertainment: Musicals &amp; Theatres</option><option value="14">Entertainment: Television</option><option value="15">Entertainment: Video Games</option><option value="16">Entertainment: Board Games</option><option value="17">Science &amp; Nature</option><option value="18">Science: Computers</option><option value="19">Science: Mathematics</option><option value="20">Mythology</option><option value="21">Sports</option><option value="22">Geography</option><option value="23">History</option><option value="24">Politics</option><option value="25">Art</option><option value="26">Celebrities</option><option value="27">Animals</option><option value="28">Vehicles</option><option value="29">Entertainment: Comics</option><option value="30">Science: Gadgets</option><option value="31">Entertainment: Japanese Anime &amp; Manga</option><option value="32">Entertainment: Cartoon &amp; Animations</option>		
    </select>
    <div class = "notifications" id = "notifications">
      <h3 class = "notification">notifications</h3>
    </div>
    <div>
    <h1 id = "question">unloaded</h1>
    <p id = "timeLeft">15s</p>
    </div>

    <h2 id = "score">score: 0</h2>
    <div class = "answergrid" id = "ansgrid">
        <div class = "ans"><button id = "ag1" class = "nobgtext anst">1</p></div>
        <div class = "ans"><button id = "ag2" class = "nobgtext anst">2</p></div>
        <div class = "ans"><button id = "ag3" class = "nobgtext anst">3</p></div>
        <div class = "ans"><button id = "ag4" class = "nobgtext anst">4</p></div>
    </div>
    <div class = "winDiv" id = "win">
      <h1 id = "win1">You Won!</h1>
      <h2 id = "winsc">score: </h2>
      <h3 id = "winhsc">high score: </h3>
      <h3 id = "winathsc">all time high score: </h3>
      <div class = "allAnswers" id = "allAnswers">
      </div>
    </div>
  </body>
</html>
